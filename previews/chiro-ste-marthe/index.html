<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dre Liette Frappier, chiropraticienne D.C. à Sainte-Marthe-sur-le-Lac. Soins chiropratiques pour toute la famille, des nourrissons aux aînés.">
    <meta name="robots" content="noindex, nofollow">
    <title>Chiro Ste-Marthe — Dre Liette Frappier, D.C.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* === RESET === */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue:        #6dbad6;
            --blue-dark:   #4fa5c2;
            --blue-deeper: #3a8aaa;
            --blue-light:  #ebf7fc;
            --white:       #ffffff;
            --off-white:   #f7fbfd;
            --dark:        #1a2535;
            --text:        #3a4a5c;
            --text-light:  #6b7d8f;
            --shadow:      0 4px 24px rgba(109,186,214,0.15);
            --shadow-lg:   0 8px 36px rgba(109,186,214,0.25);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Lato', sans-serif;
            color: var(--text);
            background: var(--white);
            overflow-x: hidden;
            line-height: 1.7;
        }

        /* === TYPOGRAPHY === */
        h1, h2, h3 {
            font-family: 'Playfair Display', Georgia, serif;
            line-height: 1.25;
            color: var(--dark);
        }

        .section-label {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--blue-dark);
            display: block;
            margin-bottom: 0.6rem;
        }

        /* === NAVIGATION === */
        nav {
            position: fixed;
            top: 36px;
            width: 100%;
            z-index: 1000;
            background: var(--white);
            border-bottom: 1px solid rgba(109,186,214,0.2);
            transition: box-shadow 0.3s ease;
        }

        nav.scrolled {
            box-shadow: 0 2px 20px rgba(0,0,0,0.07);
        }

        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--blue);
            text-decoration: none;
            font-weight: 600;
        }

        .nav-brand span {
            display: block;
            font-family: 'Lato', sans-serif;
            font-size: 0.65rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-light);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .nav-phone-num {
            color: var(--dark);
            text-decoration: none;
            font-size: 0.92rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            transition: color 0.2s;
        }

        .nav-phone-num:hover { color: var(--blue); }

        .btn-nav {
            background: var(--blue);
            color: var(--white);
            padding: 0.5rem 1.2rem;
            border-radius: 4px;
            font-size: 0.82rem;
            font-weight: 700;
            text-decoration: none;
            transition: background 0.2s, transform 0.15s;
            white-space: nowrap;
        }

        .btn-nav:hover {
            background: var(--blue-dark);
            transform: translateY(-1px);
        }

        /* === HERO === */
        .hero {
            background: var(--blue);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 2rem 80px;
            position: relative;
            overflow: hidden;
        }

        /* Dot texture */
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.09) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }

        /* Light gradient overlay */
        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(155deg, rgba(255,255,255,0.14) 0%, transparent 55%, rgba(0,0,0,0.06) 100%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 700px;
        }

        .hero-eyebrow {
            display: inline-block;
            background: rgba(255,255,255,0.22);
            color: rgba(255,255,255,0.95);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 0.35rem 1.1rem;
            border-radius: 100px;
            margin-bottom: 1.5rem;
        }

        .hero h1 {
            font-size: clamp(2.8rem, 6vw, 4.2rem);
            color: var(--white);
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 24px rgba(0,0,0,0.12);
        }

        .hero-credential {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1rem, 2.2vw, 1.25rem);
            color: rgba(255,255,255,0.88);
            margin-bottom: 1.75rem;
        }

        .hero-tagline {
            font-size: clamp(0.97rem, 1.8vw, 1.1rem);
            color: rgba(255,255,255,0.82);
            font-weight: 300;
            max-width: 520px;
            margin: 0 auto 2.5rem;
            line-height: 1.8;
        }

        .hero-ctas {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: var(--white);
            color: var(--blue);
            padding: 0.9rem 2rem;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 0.02em;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(0,0,0,0.18);
        }

        .btn-ghost {
            background: transparent;
            color: var(--white);
            padding: 0.9rem 2rem;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            border: 2px solid rgba(255,255,255,0.55);
            transition: border-color 0.2s, background 0.2s;
        }

        .btn-ghost:hover {
            border-color: var(--white);
            background: rgba(255,255,255,0.12);
        }

        .hero-wave {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            line-height: 0;
            z-index: 2;
        }

        .hero-wave svg { display: block; width: 100%; }

        /* === STATS BAR === */
        .stats-bar {
            background: var(--white);
            padding: 2.5rem 2rem;
            border-bottom: 1px solid rgba(109,186,214,0.15);
        }

        .stats-inner {
            max-width: 860px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            text-align: center;
        }

        .stat-divider {
            border-right: 1px solid rgba(109,186,214,0.2);
        }

        .stat-divider:last-child { border-right: none; }

        .stat-item { padding: 0.75rem 1rem; }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 2.3rem;
            font-weight: 700;
            color: var(--blue);
            display: block;
            line-height: 1;
            margin-bottom: 0.35rem;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-light);
            font-weight: 700;
        }

        /* === SECTIONS === */
        section { padding: 6rem 2rem; }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .section-header h2 {
            font-size: clamp(1.7rem, 3vw, 2.4rem);
            margin-bottom: 0.75rem;
        }

        .section-header p {
            max-width: 580px;
            margin: 0 auto;
            color: var(--text-light);
            font-size: 1.03rem;
        }

        .divider {
            width: 46px;
            height: 3px;
            background: var(--blue);
            margin: 0.9rem auto 1rem;
            border-radius: 2px;
        }

        /* === ABOUT === */
        .about { background: var(--white); }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
            align-items: center;
        }

        .about-text h2 {
            font-size: clamp(1.7rem, 3vw, 2.3rem);
            margin-bottom: 1.25rem;
        }

        .about-text p {
            margin-bottom: 1.2rem;
            font-size: 1.03rem;
            color: var(--text);
            line-height: 1.8;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            background: var(--blue-light);
            border-left: 3px solid var(--blue);
            padding: 0.7rem 1.2rem;
            border-radius: 0 4px 4px 0;
            font-size: 0.88rem;
            color: var(--blue-deeper);
            font-weight: 700;
            margin-top: 0.25rem;
        }

        .about-visual {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .about-emblem {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: var(--blue-light);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2.5rem;
            position: relative;
        }

        .about-emblem::before {
            content: '';
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            border: 2px dashed rgba(109,186,214,0.4);
        }

        .emblem-cross {
            width: 56px;
            height: 56px;
            margin-bottom: 1.25rem;
            color: var(--blue);
        }

        .about-emblem h3 {
            font-size: 1.05rem;
            color: var(--dark);
            margin-bottom: 0.4rem;
        }

        .about-emblem p {
            font-size: 0.82rem;
            color: var(--text-light);
            line-height: 1.6;
        }

        /* === PATIENTS === */
        .patients { background: var(--off-white); }

        .patients-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .patient-card {
            background: var(--white);
            border-radius: 8px;
            padding: 2rem 1.5rem;
            text-align: center;
            border: 1px solid rgba(109,186,214,0.15);
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
            cursor: default;
        }

        .patient-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--blue);
        }

        .patient-icon {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: var(--blue-light);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
            transition: background 0.3s;
        }

        .patient-card:hover .patient-icon { background: var(--blue); }

        .patient-icon svg {
            width: 26px;
            height: 26px;
            stroke: var(--blue);
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.3s;
        }

        .patient-card:hover .patient-icon svg { stroke: var(--white); }

        .patient-card h3 {
            font-family: 'Lato', sans-serif;
            font-size: 0.97rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }

        .patient-card p {
            font-size: 0.86rem;
            color: var(--text-light);
            line-height: 1.65;
        }

        /* === QUOTE === */
        .quote-section {
            background: var(--blue);
            padding: 5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .quote-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
            background-size: 22px 22px;
        }

        .quote-inner {
            position: relative;
            z-index: 1;
            max-width: 760px;
            margin: 0 auto;
        }

        .quote-mark {
            font-family: 'Playfair Display', serif;
            font-size: 5.5rem;
            line-height: 0.5;
            color: rgba(255,255,255,0.22);
            display: block;
            margin-bottom: 1.5rem;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1.05rem, 2.3vw, 1.4rem);
            color: var(--white);
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }

        .quote-author {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.7);
        }

        /* === SOINS === */
        .soins { background: var(--white); }

        .soins-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
        }

        .soin-item {
            padding: 1.75rem 1.25rem 1.75rem 0;
            border-top: 2px solid var(--blue-light);
            transition: border-color 0.3s;
            margin-right: 1.5rem;
        }

        .soin-item:nth-child(3n) { margin-right: 0; padding-right: 0; }

        .soin-item:hover { border-color: var(--blue); }

        .soin-item h3 {
            font-family: 'Lato', sans-serif;
            font-size: 0.97rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }

        .soin-item p {
            font-size: 0.875rem;
            color: var(--text-light);
            line-height: 1.65;
        }

        /* === CONTACT === */
        .contact { background: var(--off-white); }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4.5rem;
            align-items: start;
        }

        .contact-info h2 {
            font-size: clamp(1.7rem, 3vw, 2.2rem);
            margin-bottom: 0.5rem;
        }

        .contact-intro {
            color: var(--text-light);
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .contact-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1.75rem;
        }

        .c-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--blue-light);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .c-icon svg {
            width: 18px;
            height: 18px;
            stroke: var(--blue);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .c-text strong {
            display: block;
            font-size: 0.73rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-light);
            margin-bottom: 0.25rem;
        }

        .c-text a, .c-text p {
            color: var(--dark);
            text-decoration: none;
            font-size: 1rem;
            line-height: 1.55;
        }

        .c-text a:hover { color: var(--blue); }

        .hours-table { width: 100%; border-collapse: collapse; }

        .hours-table tr td {
            padding: 0.38rem 0;
            font-size: 0.88rem;
        }

        .hours-table tr td:first-child {
            font-weight: 700;
            color: var(--dark);
            width: 48%;
        }

        .hours-table tr td:last-child { color: var(--text-light); }

        .hours-table tr + tr td { border-top: 1px solid rgba(109,186,214,0.15); }

        .map-card {
            background: var(--blue-light);
            border-radius: 8px;
            height: 310px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            border: 1px solid rgba(109,186,214,0.2);
            text-align: center;
            padding: 2rem;
        }

        .map-card svg {
            width: 38px;
            height: 38px;
            stroke: var(--blue);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
        }

        .map-card p {
            font-size: 0.92rem;
            color: var(--text);
            line-height: 1.6;
        }

        .map-card a {
            display: inline-block;
            margin-top: 0.25rem;
            background: var(--blue);
            color: var(--white);
            padding: 0.6rem 1.4rem;
            border-radius: 4px;
            font-size: 0.82rem;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.05em;
            transition: background 0.2s;
        }

        .map-card a:hover { background: var(--blue-dark); }

        /* === FOOTER === */
        footer {
            background: var(--dark);
            color: rgba(255,255,255,0.5);
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .footer-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
        }

        .footer-brand {
            font-family: 'Playfair Display', serif;
            color: var(--blue);
            font-size: 1.1rem;
            font-weight: 600;
        }

        footer p { font-size: 0.8rem; }

        footer a {
            color: rgba(255,255,255,0.3);
            text-decoration: none;
            font-size: 0.75rem;
            transition: color 0.2s;
        }

        footer a:hover { color: var(--blue); }

        /*
